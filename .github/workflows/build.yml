name: Build Bench Tool

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        shell: pwsh
        run: |
          Set-Location src-tauri
          echo "=== CWD ===" > ../build-log.txt
          Get-Location >> ../build-log.txt
          echo "=== Rust version ===" >> ../build-log.txt
          rustc --version >> ../build-log.txt 2>&1
          echo "=== Build ===" >> ../build-log.txt
          cargo build --release --verbose >> ../build-log.txt 2>&1
          echo "EXIT_CODE=$LASTEXITCODE" >> ../build-log.txt
          exit $LASTEXITCODE

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-windows
          path: build-log.txt

      - name: Upload Windows binary
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: bench-tool-windows
          path: src-tauri/target/release/bench-tool.exe

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release
        working-directory: src-tauri

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: bench-tool-linux
          path: src-tauri/target/release/bench-tool

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release
        working-directory: src-tauri

      - name: Upload macOS binary
        uses: actions/upload-artifact@v4
        with:
          name: bench-tool-macos
          path: src-tauri/target/release/bench-tool
