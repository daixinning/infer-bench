name: Build Bench Tool

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI (npm)
        run: npm install -g @tauri-apps/cli

      - name: Build
        shell: pwsh
        run: |
          Write-Host "=== CWD ==="
          Get-Location
          Write-Host "=== Tauri CLI version ==="
          npx tauri --version
          Write-Host "=== Build ==="
          npx tauri build 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Host "tauri build failed (exit=$LASTEXITCODE), fallback to cargo build..."
            Set-Location src-tauri
            cargo build --release 2>&1
          }

      - name: List output
        if: success()
        shell: pwsh
        run: Get-ChildItem src-tauri/target/release/*.exe

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: bench-tool-windows
          path: src-tauri/target/release/bench-tool.exe

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release
        working-directory: src-tauri

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: bench-tool-linux
          path: src-tauri/target/release/bench-tool

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release
        working-directory: src-tauri

      - name: Upload macOS binary
        uses: actions/upload-artifact@v4
        with:
          name: bench-tool-macos
          path: src-tauri/target/release/bench-tool
